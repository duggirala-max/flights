name: Find Flight Deals (Stealth/GDS)

on:
  workflow_dispatch:
    inputs:
      target_months:
        description: 'Target Months (Comma separated YYYY-MM, e.g., 2026-07, 2026-08)'
        required: true
        type: string
        default: '2026-08'
      cabin_classes:
        description: 'Cabin Classes (Comma separated: economy, premium economy, business, first)'
        required: true
        type: string
        default: 'business, economy'
      adults:
        description: 'Number of Adults'
        required: true
        type: string
        default: '2'
      infants_on_lap:
        description: 'Number of Infants on Lap'
        required: true
        type: string
        default: '1'
      origin:
        description: 'Origin Airport (IATA)'
        required: true
        default: 'FRA'
      destination:
        description: 'Destination Airport (IATA)'
        required: true
        default: 'HYD'

permissions:
  contents: write

jobs:
  sweep_flights:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # We can use cache to persist SQLite DB
      - name: Cache SQLite DB
        uses: actions/cache@v3
        with:
          path: data/price_history.db
          key: ${{ runner.os }}-sqlite-history-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sqlite-history-

      - name: Run Stealth Flight Sweep
        env:
          SEATS_AERO_KEY: ${{ secrets.SEATS_AERO_KEY }}
          TARGET_MONTHS: ${{ inputs.target_months || '2026-08' }}
          CABIN_CLASSES: ${{ inputs.cabin_classes || 'business, economy' }}
          ADULTS: ${{ inputs.adults || '2' }}
          INFANTS_ON_LAP: ${{ inputs.infants_on_lap || '1' }}
          ORIGIN: ${{ inputs.origin || 'FRA' }}
          DESTINATION: ${{ inputs.destination || 'HYD' }}
          PYTHONUNBUFFERED: "1"
        run: python -u main.py

      - name: Save updated DB back to Cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: data/price_history.db
          key: ${{ runner.os }}-sqlite-history-${{ github.run_id }}

      - name: Publish Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "Update stealth flight dashboard"
