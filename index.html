<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Deals Dashboard</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #111827;
            --card-bg: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            border-radius: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }
        .flight-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
        }
        .anomaly-high {
            border-left-color: var(--danger);
        }
        .anomaly-med {
            border-left-color: var(--warning);
        }
        .price-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 150px;
        }
        .price {
            font-size: 2rem;
            font-weight: 700;
            color: #10B981;
            margin-bottom: 10px;
        }
        .price-orig {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .book-btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }
        .route-info {
            flex-grow: 1;
            padding-right: 30px;
        }
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 10px;
        }
        .detail-item strong {
            color: var(--text-main);
            display: block;
            margin-bottom: 4px;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
            background-color: #374151;
            color: #D1D5DB;
        }
        .badge-source {
            background-color: #4B5563;
        }
        .badge-flyertalk {
            background-color: rgba(139, 92, 246, 0.2);
            color: #C4B5FD;
            border: 1px solid #8B5CF6;
        }
        .badge-duffel {
            background-color: rgba(16, 185, 129, 0.2);
            color: #6EE7B7;
            border: 1px solid #10B981;
        }
        .badge-anomaly {
            background-color: rgba(239, 68, 68, 0.2);
            color: #FCA5A5;
        }
        .alert-box {
            margin-top: 10px;
            padding: 10px;
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #FCD34D;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✈️ Stealth Flight Deals Dashboard</h1>
        <p><strong>FRA</strong> ➔ <strong>HYD</strong></p>
        <p>Search Window: 2026-07-01 to 2026-10-31 | Cabin: ECONOMY | 2 Adults, 1 Infant</p>
        <p style="font-size: 0.85rem; margin-top: 15px; opacity: 0.8;">Generated at: 2026-06-24 09:09:50 UTC</p>
    </div>
    
    <div class="container">
        
            <div style="text-align: center; padding: 40px; background: var(--card-bg); border-radius: 12px;">
                No flights found. Try expanding dates or check API keys.
            </div>
        
    </div>
</body>
</html>
